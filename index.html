<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Ball Simulation</title>
  <style>
    :root {
      --bg: #ffffff;
      --floor: #9a9a9a;
      --ball: #d61f1f;
      --text: #222;
      --button: #f2f2f2;
      --button-border: #bdbdbd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrap {
      width: min(900px, 92vw);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .controls {
      margin-bottom: 14px;
    }

    button {
      appearance: none;
      border: 1px solid var(--button-border);
      background: var(--button);
      color: var(--text);
      padding: 10px 18px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.15s ease;
    }

    button:hover { background: #e9e9e9; }
    button:active { transform: scale(0.97); }

    .scene {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(to bottom, #fafafa 0%, #f3f3f3 100%);
      border: 1px solid #d8d8d8;
      border-radius: 16px;
      overflow: hidden;
      user-select: none;
      touch-action: none;
      cursor: default;
    }

    .scene.grabbing,
    .ball.grabbing {
      cursor: grabbing;
    }

    .ball {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ff7474, var(--ball) 65%, #9d1111 100%);
      will-change: top, left, width, height, border-radius;
      box-shadow: 0 10px 18px rgba(0,0,0,0.18);
      cursor: grab;
    }

    .shadow {
      position: absolute;
      height: 16px;
      width: 46px;
      border-radius: 50%;
      background: rgba(0,0,0,0.18);
      filter: blur(2px);
      will-change: transform, opacity, width, left;
      pointer-events: none;
    }

    .floor {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 64px;
      background: linear-gradient(to bottom, #ababab 0%, var(--floor) 55%, #7a7a7a 100%);
      border-top: 2px solid #8b8b8b;
      pointer-events: none;
    }

    .note {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Bouncing Ball Simulation</h1>
    <div class="controls">
      <button id="resetBtn">Reset</button>
    </div>
    <div class="scene" id="scene">
      <div class="shadow" id="shadow"></div>
      <div class="ball" id="ball"></div>
      <div class="floor"></div>
    </div>
    <div class="note">Drag the red ball with your cursor and throw it at the walls, ceiling, or floor. Reset restarts the full five-minute bounce sequence.</div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const ball = document.getElementById('ball');
    const shadow = document.getElementById('shadow');
    const resetBtn = document.getElementById('resetBtn');

    const BALL_BASE = 70;
    const FLOOR_HEIGHT = 64;
    const TOTAL_DURATION = 300; // seconds, target settle time when left alone
    const MAX_THROW_SPEED = 2400;

    let rafId = null;
    let lastTime = 0;
    let isDragging = false;
    let dragPointerId = null;
    let dragSamples = [];

    const ballState = {
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      radius: BALL_BASE / 2,
      squashX: 1,
      squashY: 1,
      bouncePeak: 0,
      settled: false
    };

    function getMetrics() {
      const rect = scene.getBoundingClientRect();
      const leftWall = 0;
      const rightWall = rect.width;
      const ceiling = 0;
      const floor = rect.height - FLOOR_HEIGHT;
      const playableHeight = floor - BALL_BASE;
      return { rect, leftWall, rightWall, ceiling, floor, playableHeight };
    }

    function getPhysicsConstants() {
      const { playableHeight } = getMetrics();
      const gravity = Math.max(1400, playableHeight * 4.1);
      const startHeight = playableHeight * 0.9;
      const startSpeed = Math.sqrt(2 * gravity * startHeight);
      const restitutionFloor = (TOTAL_DURATION - (2 * startSpeed / gravity)) /
        (TOTAL_DURATION + (2 * startSpeed / gravity));
      return {
        gravity,
        restitutionFloor: Math.min(0.997, Math.max(0.985, restitutionFloor)),
        restitutionWall: 0.94,
        restitutionCeiling: 0.94,
        airDrag: 0.9993,
        rollDrag: 0.985
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function resetBall() {
      const { rect, floor } = getMetrics();
      const physics = getPhysicsConstants();
      ballState.x = rect.width * 0.5;
      ballState.y = floor - ballState.radius;
      ballState.vx = 0;
      ballState.vy = -physics.startSpeed;
      ballState.squashX = 1;
      ballState.squashY = 1;
      ballState.bouncePeak = 1;
      ballState.settled = false;
      dragSamples = [];
      renderBall();
    }

    function renderBall() {
      const { floor, rightWall } = getMetrics();
      const xScale = ballState.squashX;
      const yScale = ballState.squashY;
      const width = BALL_BASE * xScale;
      const height = BALL_BASE * yScale;
      const left = ballState.x - width / 2;
      const top = ballState.y - height / 2;

      ball.style.width = width + 'px';
      ball.style.height = height + 'px';
      ball.style.left = left + 'px';
      ball.style.top = top + 'px';
      ball.style.borderRadius = `${50 + (1 - yScale) * 8}%`;

      const heightRatio = clamp((floor - (ballState.y + ballState.radius)) / Math.max(1, floor - BALL_BASE), 0, 1);
      const shadowWidth = 42 + (1 - heightRatio) * 32 + Math.abs(ballState.vx) * 0.004;
      const shadowOpacity = 0.12 + (1 - heightRatio) * 0.25;
      const shadowScale = 0.8 + (1 - yScale) * 0.35;
      const shadowLeft = clamp(ballState.x - shadowWidth / 2, 8, rightWall - shadowWidth - 8);

      shadow.style.bottom = (FLOOR_HEIGHT - 8) + 'px';
      shadow.style.left = shadowLeft + 'px';
      shadow.style.width = shadowWidth + 'px';
      shadow.style.opacity = shadowOpacity.toFixed(3);
      shadow.style.transform = `scale(${shadowScale})`;
    }

    function updateSquash(dt, impactAxis = null, impactSpeed = 0) {
      const baseRecover = Math.pow(0.0007, dt);
      ballState.squashX = 1 + (ballState.squashX - 1) * baseRecover;
      ballState.squashY = 1 + (ballState.squashY - 1) * baseRecover;

      if (impactAxis === 'floor' || impactAxis === 'ceiling') {
        const amount = clamp(impactSpeed / 1600, 0, 0.28);
        ballState.squashY = 1 - amount;
        ballState.squashX = 1 + amount * 0.95;
      } else if (impactAxis === 'wall') {
        const amount = clamp(impactSpeed / 1600, 0, 0.24);
        ballState.squashX = 1 - amount;
        ballState.squashY = 1 + amount * 0.85;
      }
    }

    function stepPhysics(dt) {
      const { leftWall, rightWall, ceiling, floor } = getMetrics();
      const physics = getPhysicsConstants();

      if (isDragging) {
        updateSquash(dt);
        renderBall();
        return;
      }

      ballState.vy += physics.gravity * dt;
      ballState.vx *= Math.pow(physics.airDrag, dt * 60);
      ballState.vy *= Math.pow(physics.airDrag, dt * 60);

      ballState.x += ballState.vx * dt;
      ballState.y += ballState.vy * dt;

      let impactAxis = null;
      let impactSpeed = 0;

      if (ballState.x - ballState.radius <= leftWall) {
        impactSpeed = Math.abs(ballState.vx);
        ballState.x = leftWall + ballState.radius;
        ballState.vx = Math.abs(ballState.vx) * physics.restitutionWall;
        impactAxis = 'wall';
      } else if (ballState.x + ballState.radius >= rightWall) {
        impactSpeed = Math.abs(ballState.vx);
        ballState.x = rightWall - ballState.radius;
        ballState.vx = -Math.abs(ballState.vx) * physics.restitutionWall;
        impactAxis = 'wall';
      }

      if (ballState.y - ballState.radius <= ceiling) {
        impactSpeed = Math.max(impactSpeed, Math.abs(ballState.vy));
        ballState.y = ceiling + ballState.radius;
        ballState.vy = Math.abs(ballState.vy) * physics.restitutionCeiling;
        impactAxis = 'ceiling';
      }

      if (ballState.y + ballState.radius >= floor) {
        impactSpeed = Math.max(impactSpeed, Math.abs(ballState.vy));
        ballState.y = floor - ballState.radius;

        if (Math.abs(ballState.vy) < 18) {
          ballState.vy = 0;
        } else {
          ballState.vy = -Math.abs(ballState.vy) * physics.restitutionFloor;
        }

        ballState.vx *= physics.rollDrag;
        if (Math.abs(ballState.vx) < 4) ballState.vx = 0;
        impactAxis = 'floor';
      }

      if (
        ballState.y + ballState.radius >= floor - 0.2 &&
        Math.abs(ballState.vy) < 0.5 &&
        Math.abs(ballState.vx) < 0.5
      ) {
        ballState.vx = 0;
        ballState.vy = 0;
        ballState.settled = true;
      } else {
        ballState.settled = false;
      }

      updateSquash(dt, impactAxis, impactSpeed);
      renderBall();
    }

    function animate(timestamp) {
      if (!lastTime) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      dt = Math.min(dt, 0.03);

      stepPhysics(dt);
      rafId = requestAnimationFrame(animate);
    }

    function getPointerPosition(event) {
      const rect = scene.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top,
        t: performance.now()
      };
    }

    function startDrag(event) {
      event.preventDefault();
      const pos = getPointerPosition(event);
      const dx = pos.x - ballState.x;
      const dy = pos.y - ballState.y;
      if ((dx * dx) + (dy * dy) > (ballState.radius * ballState.radius * 1.2)) return;

      isDragging = true;
      dragPointerId = event.pointerId;
      dragSamples = [pos];
      ballState.vx = 0;
      ballState.vy = 0;
      scene.classList.add('grabbing');
      ball.classList.add('grabbing');
      ball.setPointerCapture(event.pointerId);
    }

    function moveDrag(event) {
      if (!isDragging || event.pointerId !== dragPointerId) return;
      const { leftWall, rightWall, ceiling, floor } = getMetrics();
      const pos = getPointerPosition(event);

      ballState.x = clamp(pos.x, leftWall + ballState.radius, rightWall - ballState.radius);
      ballState.y = clamp(pos.y, ceiling + ballState.radius, floor - ballState.radius);
      ballState.squashX = 1.04;
      ballState.squashY = 0.96;

      dragSamples.push(pos);
      while (dragSamples.length > 8) dragSamples.shift();
      renderBall();
    }

    function endDrag(event) {
      if (!isDragging || event.pointerId !== dragPointerId) return;
      isDragging = false;
      scene.classList.remove('grabbing');
      ball.classList.remove('grabbing');
      try {
        ball.releasePointerCapture(event.pointerId);
      } catch (_) {}

      const latest = dragSamples[dragSamples.length - 1];
      let earliest = dragSamples[0] || latest;
      for (let i = dragSamples.length - 1; i >= 0; i--) {
        if (latest.t - dragSamples[i].t >= 45) {
          earliest = dragSamples[i];
          break;
        }
      }

      const dt = Math.max((latest.t - earliest.t) / 1000, 0.016);
      const rawVx = (latest.x - earliest.x) / dt;
      const rawVy = (latest.y - earliest.y) / dt;
      const speed = Math.hypot(rawVx, rawVy);
      const scale = speed > MAX_THROW_SPEED ? MAX_THROW_SPEED / speed : 1;

      ballState.vx = rawVx * scale;
      ballState.vy = rawVy * scale;
      dragPointerId = null;
      dragSamples = [];
    }

    function resetSimulation() {
      if (!rafId) {
        lastTime = 0;
        rafId = requestAnimationFrame(animate);
      }
      resetBall();
    }

    window.addEventListener('resize', () => {
      const { leftWall, rightWall, ceiling, floor } = getMetrics();
      ballState.x = clamp(ballState.x, leftWall + ballState.radius, rightWall - ballState.radius);
      ballState.y = clamp(ballState.y, ceiling + ballState.radius, floor - ballState.radius);
      renderBall();
    });

    ball.addEventListener('pointerdown', startDrag);
    scene.addEventListener('pointermove', moveDrag);
    scene.addEventListener('pointerup', endDrag);
    scene.addEventListener('pointercancel', endDrag);
    scene.addEventListener('pointerleave', (event) => {
      if (isDragging && event.pointerId === dragPointerId) endDrag(event);
    });
    resetBtn.addEventListener('click', resetSimulation);

    resetSimulation();
  </script>
</body>
</html>
