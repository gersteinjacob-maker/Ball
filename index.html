<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Ball Simulation</title>
  <style>
    :root {
      --bg: #ffffff;
      --floor: #9a9a9a;
      --ball: #d61f1f;
      --text: #222;
      --button: #f2f2f2;
      --button-border: #bdbdbd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrap {
      width: min(900px, 92vw);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .controls {
      margin-bottom: 14px;
    }

    button {
      appearance: none;
      border: 1px solid var(--button-border);
      background: var(--button);
      color: var(--text);
      padding: 10px 18px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.15s ease;
    }

    button:hover { background: #e9e9e9; }
    button:active { transform: scale(0.97); }

    .scene {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(to bottom, #fafafa 0%, #f3f3f3 100%);
      border: 1px solid #d8d8d8;
      border-radius: 16px;
      overflow: hidden;
      user-select: none;
      touch-action: none;
      cursor: default;
    }

    .scene.grabbing,
    .ball.grabbing {
      cursor: grabbing;
    }

    .ball {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ff7474, var(--ball) 65%, #9d1111 100%);
      will-change: top, left, width, height, border-radius, transform;
      transform-origin: center center;
      box-shadow: 0 10px 18px rgba(0,0,0,0.18);
      cursor: grab;
    }

    .shadow {
      position: absolute;
      height: 16px;
      width: 46px;
      border-radius: 50%;
      background: rgba(0,0,0,0.18);
      filter: blur(2px);
      will-change: transform, opacity, width, left;
      pointer-events: none;
    }

    .floor {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 64px;
      background: linear-gradient(to bottom, #ababab 0%, var(--floor) 55%, #7a7a7a 100%);
      border-top: 2px solid #8b8b8b;
      pointer-events: none;
    }

    .note {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Bouncing Ball Simulation</h1>
    <div class="controls">
      <button id="resetBtn">Reset</button>
    </div>
    <div class="scene" id="scene">
      <div class="shadow" id="shadow"></div>
      <div class="ball" id="ball"></div>
      <div class="floor"></div>
    </div>
    <div class="note">Drag the slime-like red ball with your cursor and throw it at the walls, ceiling, or floor. Light wall hits slip off, harder hits cling and droop before falling. Reset restarts the full five-minute bounce sequence.</div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const ball = document.getElementById('ball');
    const shadow = document.getElementById('shadow');
    const resetBtn = document.getElementById('resetBtn');

    const BALL_BASE = 70;
    const FLOOR_HEIGHT = 64;
    const TOTAL_DURATION = 300;
    const MAX_THROW_SPEED = 2400;

    let rafId = null;
    let lastTime = 0;
    let isDragging = false;
    let dragPointerId = null;
    let dragSamples = [];

    const ballState = {
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      radius: BALL_BASE / 2,
      squashX: 1,
      squashY: 1,
      stretchAngle: 0,
      shadowShift: 0,
      settled: false,
      stick: {
        active: false,
        surface: null,
        timer: 0,
        duration: 0,
        droop: 0,
        releaseDroop: 0,
        anchorX: 0,
        anchorY: 0,
        hard: false,
        intensity: 0
      },
      dragVisual: {
        x: 0,
        y: 0,
        lagX: 0,
        lagY: 0,
        active: false
      }
    };

    function getMetrics() {
      const rect = scene.getBoundingClientRect();
      const leftWall = 0;
      const rightWall = rect.width;
      const ceiling = 0;
      const floor = rect.height - FLOOR_HEIGHT;
      const playableHeight = floor - BALL_BASE;
      return { rect, leftWall, rightWall, ceiling, floor, playableHeight };
    }

    function getPhysicsConstants() {
      const { playableHeight } = getMetrics();
      const gravity = Math.max(1400, playableHeight * 4.1);
      const startHeight = playableHeight * 0.9;
      const startSpeed = Math.sqrt(2 * gravity * startHeight);
      const restitutionFloor = (TOTAL_DURATION - (2 * startSpeed / gravity)) /
        (TOTAL_DURATION + (2 * startSpeed / gravity));
      return {
        gravity,
        startSpeed,
        restitutionFloor: Math.min(0.997, Math.max(0.985, restitutionFloor)),
        restitutionWall: 0.9,
        restitutionCeiling: 0.9,
        airDrag: 0.9993,
        rollDrag: 0.985
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function resetStick() {
      ballState.stick.active = false;
      ballState.stick.surface = null;
      ballState.stick.timer = 0;
      ballState.stick.duration = 0;
      ballState.stick.droop = 0;
      ballState.stick.releaseDroop = 0;
      ballState.stick.anchorX = 0;
      ballState.stick.anchorY = 0;
      ballState.stick.hard = false;
      ballState.stick.intensity = 0;
    }

    function resetBall() {
      const { rect, floor } = getMetrics();
      const physics = getPhysicsConstants();
      resetStick();
      ballState.x = rect.width * 0.5;
      ballState.y = floor - ballState.radius;
      ballState.vx = 0;
      ballState.vy = -physics.startSpeed;
      ballState.squashX = 1;
      ballState.squashY = 1;
      ballState.stretchAngle = 0;
      ballState.shadowShift = 0;
      ballState.settled = false;
      ballState.dragVisual.active = false;
      dragSamples = [];
      renderBall();
    }

    function renderBall() {
      const { floor, rightWall } = getMetrics();
      const xScale = ballState.squashX;
      const yScale = ballState.squashY;
      const width = BALL_BASE * xScale;
      const height = BALL_BASE * yScale;
      const visualX = ballState.dragVisual.active ? ballState.dragVisual.x : ballState.x;
      const visualY = ballState.dragVisual.active ? ballState.dragVisual.y : ballState.y;
      const left = visualX - width / 2;
      const top = visualY - height / 2;

      ball.style.width = width + 'px';
      ball.style.height = height + 'px';
      ball.style.left = left + 'px';
      ball.style.top = top + 'px';
      ball.style.borderRadius = `${50 + (1 - yScale) * 10}%`;
      ball.style.transform = `rotate(${ballState.stretchAngle}rad)`;

      const heightRatio = clamp((floor - (ballState.y + ballState.radius)) / Math.max(1, floor - BALL_BASE), 0, 1);
      const shadowWidth = 42 + (1 - heightRatio) * 32 + Math.abs(ballState.vx) * 0.004;
      const shadowOpacity = 0.12 + (1 - heightRatio) * 0.25;
      const shadowScale = 0.8 + (1 - yScale) * 0.35;
      const shadowLeft = clamp(ballState.x - shadowWidth / 2 + ballState.shadowShift, 8, rightWall - shadowWidth - 8);

      shadow.style.bottom = (FLOOR_HEIGHT - 8) + 'px';
      shadow.style.left = shadowLeft + 'px';
      shadow.style.width = shadowWidth + 'px';
      shadow.style.opacity = shadowOpacity.toFixed(3);
      shadow.style.transform = `scale(${shadowScale})`;
    }

    function updateSquash(dt, impactAxis = null, impactSpeed = 0) {
      const baseRecover = Math.pow(0.0008, dt);
      ballState.squashX = 1 + (ballState.squashX - 1) * baseRecover;
      ballState.squashY = 1 + (ballState.squashY - 1) * baseRecover;
      ballState.stretchAngle *= Math.pow(0.002, dt);
      ballState.shadowShift *= Math.pow(0.0009, dt);

      if (impactAxis === 'floor' || impactAxis === 'ceiling') {
        const amount = clamp(impactSpeed / 1600, 0, 0.28);
        ballState.squashY = 1 - amount;
        ballState.squashX = 1 + amount * 0.95;
      } else if (impactAxis === 'wall') {
        const amount = clamp(impactSpeed / 1600, 0, 0.26);
        ballState.squashX = 1 - amount;
        ballState.squashY = 1 + amount * 0.9;
      }
    }

    function beginStickyContact(surface, impactSpeed, hitX, hitY) {
      const { leftWall, rightWall, ceiling } = getMetrics();
      const isHard = impactSpeed > 900;
      const isMedium = impactSpeed > 360;
      if (!isMedium && surface !== 'ceiling') return false;
      if (surface === 'ceiling' && impactSpeed < 420) return false;

      resetStick();
      ballState.stick.active = true;
      ballState.stick.surface = surface;
      ballState.stick.timer = 0;
      ballState.stick.duration = isHard ? clamp(0.95 + impactSpeed / 900, 1.1, 2.9) : clamp(0.28 + impactSpeed / 1500, 0.35, 0.9);
      ballState.stick.droop = 0;
      ballState.stick.releaseDroop = isHard ? BALL_BASE * 1.15 : BALL_BASE * 0.6;
      ballState.stick.hard = isHard;
      ballState.stick.intensity = clamp(impactSpeed / 1500, 0.25, 1.15);
      ballState.vx = 0;
      ballState.vy = 0;

      if (surface === 'left') {
        ballState.stick.anchorX = leftWall + ballState.radius * 0.78;
        ballState.stick.anchorY = hitY;
      } else if (surface === 'right') {
        ballState.stick.anchorX = rightWall - ballState.radius * 0.78;
        ballState.stick.anchorY = hitY;
      } else {
        ballState.stick.anchorX = hitX;
        ballState.stick.anchorY = ceiling + ballState.radius * 0.76;
      }
      return true;
    }

    function updateSticky(dt) {
      const physics = getPhysicsConstants();
      const { floor } = getMetrics();
      const s = ballState.stick;
      if (!s.active) return false;

      s.timer += dt;
      const droopRate = s.hard ? 26 + (1 - s.intensity) * 10 : 75 + (1 - s.intensity) * 45;
      s.droop += physics.gravity * dt * dt * droopRate;

      if (s.surface === 'left') {
        ballState.x = s.anchorX;
        ballState.y = clamp(s.anchorY + s.droop, ballState.radius, floor - ballState.radius);
        const stretch = clamp(0.14 + s.droop / 170, 0.14, 0.7);
        ballState.squashX = 1 - stretch * 0.55;
        ballState.squashY = 1 + stretch;
        ballState.stretchAngle = -0.12;
        ballState.shadowShift = -8;
      } else if (s.surface === 'right') {
        ballState.x = s.anchorX;
        ballState.y = clamp(s.anchorY + s.droop, ballState.radius, floor - ballState.radius);
        const stretch = clamp(0.14 + s.droop / 170, 0.14, 0.7);
        ballState.squashX = 1 - stretch * 0.55;
        ballState.squashY = 1 + stretch;
        ballState.stretchAngle = 0.12;
        ballState.shadowShift = 8;
      } else if (s.surface === 'ceiling') {
        ballState.x = s.anchorX;
        ballState.y = s.anchorY + clamp(s.droop, 0, BALL_BASE * 1.45);
        const stretch = clamp(0.18 + s.droop / 150, 0.18, 0.86);
        ballState.squashX = 1 - stretch * 0.35;
        ballState.squashY = 1 + stretch;
        ballState.stretchAngle = 0;
        ballState.shadowShift = 0;
      }

      const timedOut = s.timer >= s.duration;
      const droopedOff = s.droop >= s.releaseDroop;
      if (timedOut || droopedOff || ballState.y + ballState.radius >= floor - 1) {
        if (s.surface === 'left') {
          ballState.vx = 20;
        } else if (s.surface === 'right') {
          ballState.vx = -20;
        } else {
          ballState.vx *= 0.15;
        }
        ballState.vy = Math.min(physics.gravity * 0.18 + s.droop * 1.5, 520);
        resetStick();
      }
      return true;
    }

    function stepPhysics(dt) {
      const { leftWall, rightWall, ceiling, floor } = getMetrics();
      const physics = getPhysicsConstants();

      if (isDragging) {
        ballState.dragVisual.active = true;
        ballState.dragVisual.lagX += (ballState.x - ballState.dragVisual.x) * Math.min(1, dt * 26);
        ballState.dragVisual.lagY += (ballState.y - ballState.dragVisual.y) * Math.min(1, dt * 18);
        ballState.dragVisual.x += ballState.dragVisual.lagX;
        ballState.dragVisual.y += ballState.dragVisual.lagY + physics.gravity * dt * 0.018;
        ballState.dragVisual.x += (ballState.x - ballState.dragVisual.x) * Math.min(1, dt * 14);
        ballState.dragVisual.y += (ballState.y + 8 - ballState.dragVisual.y) * Math.min(1, dt * 10);
        renderBall();
        return;
      }

      ballState.dragVisual.active = false;

      if (updateSticky(dt)) {
        renderBall();
        return;
      }

      ballState.vy += physics.gravity * dt;
      ballState.vx *= Math.pow(physics.airDrag, dt * 60);
      ballState.vy *= Math.pow(physics.airDrag, dt * 60);

      ballState.x += ballState.vx * dt;
      ballState.y += ballState.vy * dt;

      let impactAxis = null;
      let impactSpeed = 0;

      if (ballState.x - ballState.radius <= leftWall) {
        impactSpeed = Math.abs(ballState.vx);
        ballState.x = leftWall + ballState.radius;
        const stuck = beginStickyContact('left', impactSpeed, ballState.x, ballState.y);
        if (!stuck) {
          ballState.vx = Math.abs(ballState.vx) * physics.restitutionWall;
          impactAxis = 'wall';
        } else {
          impactAxis = 'wall';
        }
      } else if (ballState.x + ballState.radius >= rightWall) {
        impactSpeed = Math.abs(ballState.vx);
        ballState.x = rightWall - ballState.radius;
        const stuck = beginStickyContact('right', impactSpeed, ballState.x, ballState.y);
        if (!stuck) {
          ballState.vx = -Math.abs(ballState.vx) * physics.restitutionWall;
          impactAxis = 'wall';
        } else {
          impactAxis = 'wall';
        }
      }

      if (!ballState.stick.active && ballState.y - ballState.radius <= ceiling) {
        impactSpeed = Math.max(impactSpeed, Math.abs(ballState.vy));
        ballState.y = ceiling + ballState.radius;
        const stuck = beginStickyContact('ceiling', impactSpeed, ballState.x, ballState.y);
        if (!stuck) {
          ballState.vy = Math.abs(ballState.vy) * physics.restitutionCeiling;
          impactAxis = 'ceiling';
        } else {
          impactAxis = 'ceiling';
        }
      }

      if (!ballState.stick.active && ballState.y + ballState.radius >= floor) {
        impactSpeed = Math.max(impactSpeed, Math.abs(ballState.vy));
        ballState.y = floor - ballState.radius;

        if (Math.abs(ballState.vy) < 18) {
          ballState.vy = 0;
        } else {
          ballState.vy = -Math.abs(ballState.vy) * physics.restitutionFloor;
        }

        ballState.vx *= physics.rollDrag;
        if (Math.abs(ballState.vx) < 4) ballState.vx = 0;
        impactAxis = 'floor';
      }

      if (
        ballState.y + ballState.radius >= floor - 0.2 &&
        Math.abs(ballState.vy) < 0.5 &&
        Math.abs(ballState.vx) < 0.5
      ) {
        ballState.vx = 0;
        ballState.vy = 0;
        ballState.settled = true;
      } else {
        ballState.settled = false;
      }

      updateSquash(dt, impactAxis, impactSpeed);
      renderBall();
    }

    function animate(timestamp) {
      if (!lastTime) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      dt = Math.min(dt, 0.03);

      stepPhysics(dt);
      rafId = requestAnimationFrame(animate);
    }

    function getPointerPosition(event) {
      const rect = scene.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top,
        t: performance.now()
      };
    }

    function startDrag(event) {
      event.preventDefault();
      const pos = getPointerPosition(event);
      const dx = pos.x - ballState.x;
      const dy = pos.y - ballState.y;
      if ((dx * dx) + (dy * dy) > (ballState.radius * ballState.radius * 1.28)) return;

      isDragging = true;
      dragPointerId = event.pointerId;
      dragSamples = [pos];
      resetStick();
      ballState.vx = 0;
      ballState.vy = 0;
      ballState.dragVisual.active = true;
      ballState.dragVisual.x = ballState.x;
      ballState.dragVisual.y = ballState.y;
      ballState.dragVisual.lagX = 0;
      ballState.dragVisual.lagY = 0;
      scene.classList.add('grabbing');
      ball.classList.add('grabbing');
      ball.setPointerCapture(event.pointerId);
    }

    function moveDrag(event) {
      if (!isDragging || event.pointerId !== dragPointerId) return;
      const { leftWall, rightWall, ceiling, floor } = getMetrics();
      const pos = getPointerPosition(event);
      const prev = dragSamples[dragSamples.length - 1] || pos;
      const dx = pos.x - prev.x;
      const dy = pos.y - prev.y;

      ballState.x = clamp(pos.x, leftWall + ballState.radius, rightWall - ballState.radius);
      ballState.y = clamp(pos.y, ceiling + ballState.radius, floor - ballState.radius);

      const travel = Math.hypot(dx, dy);
      const stretch = clamp(0.1 + Math.abs(dy) * 0.01 + travel * 0.006, 0.12, 0.62);
      ballState.squashX = 1 - stretch * 0.38;
      ballState.squashY = 1 + stretch * 0.72;
      ballState.stretchAngle = clamp(Math.atan2(dy + 18, dx || 0.001) - Math.PI / 2, -0.55, 0.55);
      ballState.shadowShift = clamp(dx * 0.35, -18, 18);

      dragSamples.push(pos);
      while (dragSamples.length > 10) dragSamples.shift();
      renderBall();
    }

    function endDrag(event) {
      if (!isDragging || event.pointerId !== dragPointerId) return;
      isDragging = false;
      scene.classList.remove('grabbing');
      ball.classList.remove('grabbing');
      try {
        ball.releasePointerCapture(event.pointerId);
      } catch (_) {}

      const latest = dragSamples[dragSamples.length - 1];
      let earliest = dragSamples[0] || latest;
      for (let i = dragSamples.length - 1; i >= 0; i--) {
        if (latest.t - dragSamples[i].t >= 45) {
          earliest = dragSamples[i];
          break;
        }
      }

      const dt = Math.max((latest.t - earliest.t) / 1000, 0.016);
      const rawVx = (latest.x - earliest.x) / dt;
      const rawVy = (latest.y - earliest.y) / dt;
      const speed = Math.hypot(rawVx, rawVy);
      const scale = speed > MAX_THROW_SPEED ? MAX_THROW_SPEED / speed : 1;

      ballState.vx = rawVx * scale;
      ballState.vy = rawVy * scale;
      ballState.dragVisual.active = false;
      dragPointerId = null;
      dragSamples = [];
    }

    function resetSimulation() {
      if (!rafId) {
        lastTime = 0;
        rafId = requestAnimationFrame(animate);
      }
      resetBall();
    }

    window.addEventListener('resize', () => {
      const { leftWall, rightWall, ceiling, floor } = getMetrics();
      ballState.x = clamp(ballState.x, leftWall + ballState.radius, rightWall - ballState.radius);
      ballState.y = clamp(ballState.y, ceiling + ballState.radius, floor - ballState.radius);
      if (ballState.dragVisual.active) {
        ballState.dragVisual.x = ballState.x;
        ballState.dragVisual.y = ballState.y;
      }
      renderBall();
    });

    ball.addEventListener('pointerdown', startDrag);
    scene.addEventListener('pointermove', moveDrag);
    scene.addEventListener('pointerup', endDrag);
    scene.addEventListener('pointercancel', endDrag);
    scene.addEventListener('pointerleave', (event) => {
      if (isDragging && event.pointerId === dragPointerId) endDrag(event);
    });
    resetBtn.addEventListener('click', resetSimulation);

    resetSimulation();
  </script>
</body>
</html>
